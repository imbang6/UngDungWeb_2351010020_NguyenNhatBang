<body>
    <h1 align="center" >Bài 1: Vẽ các hình cơ bản</h1>
    <svg width="500" height="400">
        <rect x="100"  y="150" width="353" height="164" style="fill: #0097D9; stroke: black; stroke-width:2"></rect>
        <circle cx="272" cy="230" r="50" style="fill: #D9122C; stroke: gray; stroke-width:2"></circle>
         <polygon points="100,150,455,313" style="fill:#FFB4C2; stroke: yellow; stroke-width:5"></polygon> 
    </svg>
    

     <h1 align="center" >Bài 2: Vẽ ngôi nhà đơn giản</h1>
    <svg width="500" height="400">
        <polygon points="250,50,450,150,50,150" style="fill: #F06C24; stroke: black; stroke-width:2"></polygon> 
        <rect x="100"  y="150" width="300" height="150" style="fill: #B04F48; stroke: black; stroke-width:2"></rect>
        <rect x="280" y="200" width="80" height="100" style="fill:#5E2B27; stroke:black"></rect>
        <rect x="150" y="180" width="50" height="50" style="fill: lightblue; stroke:black"></rect>
    </svg>
